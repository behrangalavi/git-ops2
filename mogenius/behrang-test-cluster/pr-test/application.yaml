apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pr-test
  namespace: mogenius-argo-cd
  labels:
    managed-by: mogenius
spec:
  destination:
    name: in-cluster
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      enabled: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  project: mogenius
  source:
    repoURL: https://helm.mogenius.com/public
    targetRevision: 1.2.2
    chart: moac
    helm:
      releaseName: pr-test
      valuesObject:
        rawResources:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              labels:
                managed-by: mogenius
              name: test
              namespace: podinfo
            spec:
              progressDeadlineSeconds: 600
              replicas: 2
              revisionHistoryLimit: 10
              selector:
                matchLabels:
                  app: test
              strategy:
                rollingUpdate:
                  maxSurge: 25%
                  maxUnavailable: 25%
                type: RollingUpdate
              template:
                metadata:
                  labels:
                    app: test
                    managed-by: mogenius
                spec:
                  containers:
                    - image: nginx:latest
                      imagePullPolicy: Always
                      name: test
                      ports:
                        - containerPort: 80
                          protocol: TCP
                      terminationMessagePath: /dev/termination-log
                      terminationMessagePolicy: File
                  dnsPolicy: ClusterFirst
                  restartPolicy: Always
                  schedulerName: default-scheduler
                  terminationGracePeriodSeconds: 30
